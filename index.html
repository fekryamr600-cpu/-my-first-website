<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة تعليمية متكاملة</title><style>
body {
    margin: 0;
    font-family: Tahoma;
    background: #eef2f7;
}

header {
    background: linear-gradient(45deg,#1e3c72,#2a5298);
    color: white;
    padding: 25px;
    text-align: center;
    font-size: 30px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #2a5298;
    color: white;
    cursor: pointer;
}

video, iframe {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}

.file-item {
    background: #f1f1f1;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style></head><body><header>
منصة تعليمية (فيديوهات + PDF)
</header><div class="container"><div class="card">
<h2>إضافة فيديو</h2>
<input type="text" id="videoTitle" placeholder="عنوان الفيديو">
<input type="text" id="videoURL" placeholder="رابط الفيديو (YouTube أو MP4)">
<button onclick="addVideo()">إضافة الفيديو</button>
<div id="videoList"></div>
</div><div class="card">
<h2>إضافة ملف PDF</h2>
<input type="text" id="pdfTitle" placeholder="اسم الملف">
<input type="text" id="pdfURL" placeholder="رابط ملف PDF">
<button onclick="addPDF()">إضافة الملف</button>
<div id="pdfList"></div>
</div></div><script>
let videos = [];
let pdfs = [];

function addVideo() {
    let title = document.getElementById("videoTitle").value;
    let url = document.getElementById("videoURL").value;

    if(title === "" || url === "") {
        alert("من فضلك املأ البيانات");
        return;
    }

    videos.push({title, url});
    displayVideos();
}

function displayVideos() {
    let list = document.getElementById("videoList");
    list.innerHTML = "";

    videos.forEach((video, index) => {
        let div = document.createElement("div");
        div.className = "file-item";

        if(video.url.includes("youtube")) {
            div.innerHTML = `
                <h3>${video.title}</h3>
                <iframe src="${video.url.replace("watch?v=","embed/")}" allowfullscreen></iframe>
                <button onclick="deleteVideo(${index})">حذف</button>
            `;
        } else {
            div.innerHTML = `
                <h3>${video.title}</h3>
                <video controls src="${video.url}"></video>
                <button onclick="deleteVideo(${index})">حذف</button>
            `;
        }

        list.appendChild(div);
    });
}

function deleteVideo(index) {
    videos.splice(index,1);
    displayVideos();
}

function addPDF() {
    let title = document.getElementById("pdfTitle").value;
    let url = document.getElementById("pdfURL").value;

    if(title === "" || url === "") {
        alert("من فضلك املأ البيانات");
        return;
    }

    pdfs.push({title, url});
    displayPDFs();
}

function displayPDFs() {
    let list = document.getElementById("pdfList");
    list.innerHTML = "";

    pdfs.forEach((pdf, index) => {
        let div = document.createElement("div");
        div.className = "file-item";

        div.innerHTML = `
            <h3>${pdf.title}</h3>
            <iframe src="${pdf.url}"></iframe>
            <button onclick="deletePDF(${index})">حذف</button>
        `;

        list.appendChild(div);
    });
}

function deletePDF(index) {
    pdfs.splice(index,1);
    displayPDFs();
}

</script></body>
</html>
