<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة سباق سيارات</title>

<style>
body {
    margin: 0;
    background: #222;
    overflow: hidden;
    font-family: Arial;
    text-align: center;
    color: white;
}

#game {
    width: 350px;
    height: 600px;
    margin: auto;
    background: #555;
    position: relative;
    overflow: hidden;
    border: 4px solid white;
}

/* الطريق */
.road-line {
    width: 10px;
    height: 60px;
    background: white;
    position: absolute;
    left: 170px;
}

/* العربية */
#car {
    width: 50px;
    height: 80px;
    background: lime;
    position: absolute;
    bottom: 10px;
    left: 150px;
    border-radius: 10px;
}

/* عربيات العدو */
.enemy {
    width: 50px;
    height: 80px;
    background: red;
    position: absolute;
    top: -100px;
    border-radius: 10px;
}

/* أزرار الموبايل */
.controls {
    margin-top: 10px;
}

button {
    width: 100px;
    height: 50px;
    font-size: 20px;
    margin: 5px;
}
</style>
</head>

<body>

<h2>🏎️ لعبة سباق سيارات</h2>

<div id="game">
    <div id="car"></div>
</div>

<div class="controls">
    <button onclick="moveLeft()">⬅️</button>
    <button onclick="moveRight()">➡️</button>
</div>

<h3 id="score">النقاط: 0</h3>

<script>
let car = document.getElementById("car");
let game = document.getElementById("game");
let scoreDisplay = document.getElementById("score");

let carX = 150;
let score = 0;
let gameOver = false;

// تحريك العربية
function moveLeft() {
    if (carX > 0) {
        carX -= 25;
        car.style.left = carX + "px";
    }
}

function moveRight() {
    if (carX < 300) {
        carX += 25;
        car.style.left = carX + "px";
    }
}

// إنشاء عربية عدو
function createEnemy() {
    if (gameOver) return;

    let enemy = document.createElement("div");
    enemy.classList.add("enemy");

    let enemyX = Math.floor(Math.random() * 300);
    enemy.style.left = enemyX + "px";

    game.appendChild(enemy);

    let fall = setInterval(() => {
        let top = enemy.offsetTop;
        enemy.style.top = top + 5 + "px";

        // تصادم
        if (
            top > 500 &&
            enemyX < carX + 50 &&
            enemyX + 50 > carX
        ) {
            alert("💀 خسرت! النقاط: " + score);
            gameOver = true;
            location.reload();
        }

        // خروج من الشاشة
        if (top > 600) {
            clearInterval(fall);
            enemy.remove();
            score++;
            scoreDisplay.innerText = "النقاط: " + score;
        }
    }, 30);
}

// تكرار العربيات
setInterval(createEnemy, 1200);
</script>

</body>
</html>
