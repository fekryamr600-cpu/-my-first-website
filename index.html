<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة الهروب</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial;
        color: white;
        text-align: center;
    }

    #game {
        width: 400px;
        height: 600px;
        background: #111;
        margin: auto;
        position: relative;
        border: 3px solid white;
    }

    #player {
        width: 50px;
        height: 50px;
        background: lime;
        position: absolute;
        bottom: 10px;
        left: 175px;
    }

    .enemy {
        width: 50px;
        height: 50px;
        background: red;
        position: absolute;
        top: 0;
    }

    #score {
        margin-top: 10px;
        font-size: 20px;
    }
</style>
</head>

<body>

<h2>🎮 لعبة تجنب العوائق</h2>
<div id="game">
    <div id="player"></div>
</div>

<div id="score">النقاط: 0</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");
let scoreDisplay = document.getElementById("score");

let playerX = 175;
let score = 0;
let gameOver = false;

// تحكم بالكيبورد
document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowLeft" && playerX > 0) {
        playerX -= 25;
    }
    if (e.key === "ArrowRight" && playerX < 350) {
        playerX += 25;
    }
    player.style.left = playerX + "px";
});

// إنشاء عدو
function createEnemy() {
    if (gameOver) return;

    let enemy = document.createElement("div");
    enemy.classList.add("enemy");

    let enemyX = Math.floor(Math.random() * 350);
    enemy.style.left = enemyX + "px";

    game.appendChild(enemy);

    let fall = setInterval(() => {
        let enemyTop = enemy.offsetTop;
        enemy.style.top = enemyTop + 5 + "px";

        // تصادم
        if (
            enemyTop > 540 &&
            enemyX < playerX + 50 &&
            enemyX + 50 > playerX
        ) {
            alert("💀 خسرت! النقاط: " + score);
            gameOver = true;
            location.reload();
        }

        // خرج من الشاشة
        if (enemyTop > 600) {
            clearInterval(fall);
            enemy.remove();
            score++;
            scoreDisplay.innerText = "النقاط: " + score;
        }
    }, 30);
}

// تكرار الأعداء
setInterval(createEnemy, 1000);

</script>

</body>
</html>
