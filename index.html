<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مسبحة إلكترونية احترافية</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to bottom, #141e30, #243b55);
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-bottom: 15px;
}

.counter {
    font-size: 70px;
    margin: 20px 0;
    background: #000;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

button {
    width: 85%;
    max-width: 320px;
    padding: 15px;
    margin: 8px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

button:active {
    transform: scale(0.95);
}

.btn1 { background: #27ae60; }
.btn2 { background: #2980b9; }
.btn3 { background: #8e44ad; }
.btn4 { background: #f39c12; }

.reset { background: #c0392b; }
.goal { background: #16a085; }

</style>
</head>

<body>

<h1>📿 مسبحة إلكترونية</h1>

<div class="counter" id="count">0</div>

<h3 id="zekr">—</h3>

<button class="btn1" onclick="tasbeeh('سبحان الله')">سبحان الله</button>
<button class="btn2" onclick="tasbeeh('الحمد لله')">الحمد لله</button>
<button class="btn3" onclick="tasbeeh('الله أكبر')">الله أكبر</button>
<button class="btn4" onclick="tasbeeh('أستغفر الله')">أستغفر الله</button>

<button class="goal" onclick="setGoal()">🎯 تحديد هدف</button>
<button class="reset" onclick="resetCounter()">🔄 تصفير</button>

<h3 id="goalText">🎯 الهدف: غير محدد</h3>

<script>
let count = parseInt(localStorage.getItem("count")) || 0;
let zekr = localStorage.getItem("zekr") || "—";
let goal = parseInt(localStorage.getItem("goal")) || 0;

updateUI();

function updateUI() {
    document.getElementById("count").innerText = count;
    document.getElementById("zekr").innerText = zekr;
    document.getElementById("goalText").innerText =
        goal ? "🎯 الهدف: " + goal : "🎯 الهدف: غير محدد";
}

function tasbeeh(text) {
    count++;
    zekr = text;

    // اهتزاز (لو موبايل)
    if (navigator.vibrate) {
        navigator.vibrate(50);
    }

    // صوت بسيط
    let audio = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
    audio.play();

    // تحقق من الهدف
    if (goal && count >= goal) {
        alert("🎉 وصلت للهدف!");
    }

    save();
    updateUI();
}

function resetCounter() {
    count = 0;
    save();
    updateUI();
}

function setGoal() {
    let userGoal = prompt("ادخل عدد الهدف:");
    if (userGoal) {
        goal = parseInt(userGoal);
        localStorage.setItem("goal", goal);
        updateUI();
    }
}

function save() {
    localStorage.setItem("count", count);
    localStorage.setItem("zekr", zekr);
}
</script>

</body>
</html>
