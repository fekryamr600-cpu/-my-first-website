<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الموقع التعليمي</title>

<style>
body {
    font-family: Tahoma;
    background: #f5f5f5;
    margin: 0;
}

header {
    background: #2a5298;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

iframe, video {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
📚 منصة تعليمية
</header>

<div class="container">

<div id="videos"></div>
<div id="pdfs"></div>

</div>

<script>
let videos = JSON.parse(localStorage.getItem('videos')) || [];
let pdfs = JSON.parse(localStorage.getItem('pdfs')) || [];

function draw() {

    let v = document.getElementById('videos');
    v.innerHTML = "<h2>🎥 الفيديوهات</h2>";

    videos.forEach(x => {
        v.innerHTML += `
        <div class="card">
            <h3>${x.t}</h3>
            <iframe src="${x.u.replace("watch?v=","embed/")}" allowfullscreen></iframe>
        </div>`;
    });

    let p = document.getElementById('pdfs');
    p.innerHTML = "<h2>📄 الملفات</h2>";

    pdfs.forEach(x => {
        p.innerHTML += `
        <div class="card">
            <h3>${x.t}</h3>
            <iframe src="${x.u}" height="400"></iframe>
        </div>`;
    });
}

draw();
</script>

</body>
</html>
