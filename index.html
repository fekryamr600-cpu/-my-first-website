<!DOCTYPE html>
<html>
<head>
    <title>Amr Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
        }

        h1 {
            font-size: 40px;
            margin-top: 20px;
        }

        p {
            font-size: 18px;
            color: #ccc;
        }

        button {
            margin-top: 20px;
            background: white;
            color: #243b55;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="My Photo">
        <h1>أنا عمرو 👋</h1>
        <p>مهتم بالبرمجة وببني أول Portfolio ليا 🔥</p>
        <button onclick="alert('تواصل معايا قريب 😎')">تواصل معي</button>
    </div>

</body>
</html>
